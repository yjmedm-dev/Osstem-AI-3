[SAP]
transaction = FBL5N

# ALV 그리드 ID
grid_id = wnd[0]/usr/cntlGRID1/shellcont/shell/shellcont[1]/shell

# 실행 키: F8 = 8
execute_vkey = 8

# 데이터 추출 방식: grid (ALV 직접 읽기)
extract_mode = grid

# ── FBL5N 선택 화면 필드 ID (진단 스크립트로 확인된 실제 값) ──
customer_field_id   = wnd[0]/usr/ctxtDD_KUNNR-LOW
company_code_field  = wnd[0]/usr/ctxtDD_BUKRS-LOW
company_code        = 1000

# 모든 항목 라디오버튼
all_items_radio     = wnd[0]/usr/radX_AISEL

# 반제항목 라디오버튼 (offset 조회 전용)
cleared_items_radio = wnd[0]/usr/radX_CLSEL

# 미결항목 라디오버튼 (검증 조회 전용)
open_items_radio    = wnd[0]/usr/radX_OPSEL

# 미결항목 모드 — 주요일자의 미결항목 (key date) 필드
open_items_keydate_field = wnd[0]/usr/ctxtPA_STIDA

# 전기일 기간 (모든 항목 모드)
budat_low_field     = wnd[0]/usr/ctxtSO_BUDAT-LOW
budat_high_field    = wnd[0]/usr/ctxtSO_BUDAT-HIGH

# 유형 체크박스
normal_items_chk    = wnd[0]/usr/chkX_NORM
special_gl_chk      = wnd[0]/usr/chkX_SHBV
noted_items_chk     = wnd[0]/usr/chkX_PARK

# 전기일자 컬럼키 (ALV 정렬용)
posting_date_col    = BUDAT

# 반제일 필드 (offset 다운로드용 — SAP GUI 레코더로 실제 ID 확인 필요)
augdt_low_field     = wnd[0]/usr/ctxtSO_AUGDT-LOW
augdt_high_field    = wnd[0]/usr/ctxtSO_AUGDT-HIGH


[PATHS]
source_dir       = D:/해외관리실/채권명세서/자동화/ar
raw_dir          = D:/해외관리실/채권명세서/자동화/ar/raw
intermediate_dir = sapost/data/intermediate
output_dir       = sapost/data/output
template_path    = sapost/templates/template.xlsx


[APPEND]
# SG 컬럼명 (ALV 표시명 기준)
sg_column = SG

# G/L 계정 컬럼명 (ALV 표시명 기준 — 다운로드 후 실제 헤더 확인 필요)
gl_account_column = G/L 계정

# SG = M → 붙여넣을 시트 (| 구분으로 후보 시트명 OR 처리)
sheet_misugeun_bal  = 미수금(잔액)|Other Account Receivable|Non trade AR(Balance)|AR-other(BALANCE)
sheet_misugeun      = 미수금|Other AR(From to HQ Sub)|AR-other|Non trade AR|Other AR raw

# SG != M, G/L 있음 → 붙여넣을 시트 (| 구분으로 후보 시트명 OR 처리)
sheet_ar_bal        = 외화외상매출금(잔액)|외상매출금(잔액)|Account Receivable_trade|Trade AR(Balance)|AR(BALANCE)
sheet_ar            = 외화외상매출금|외상매출금|AR(From to HQ Sub)|AR|Trade AR|AR raw

# 헤더 행 번호 (외화외상매출금(잔액) 계열 시트만 8행, 나머지 4행)
header_row_default  = 4
header_row_ar_bal   = 8

# SAP ALV 그리드 컬럼명 (실제 표시명에 맞게 수정)
col_jijung          = 지정
col_budat           = 전기일
col_augdt           = 반제일
col_text            = 텍스트
col_gl_amount       = 총계정원장금액
col_currency        = 통화
col_clearing_doc    = 반제전표
col_net_due_date    = 순만기일

# 엑셀 시트 대상 컬럼 헤더명
xls_jijung      = 지정
xls_jeungbil    = 증빙일
xls_elapsed     = 경과기간
xls_text        = 텍스트
xls_amount      = 금액
xls_currency    = 통화
xls_ar_balance  = 상환 후 잔액
xls_mangil      = 만기일
xls_gigsanghwan = 기상환액
xls_sanghwanil  = 상환일
xls_banjejeunpyo= 반제전표

# append 기준 컬럼 (마지막 데이터 행 탐색용)
anchor_col = 증빙일

# 수식 범위 자동 확장 대상 헤더명 (쉼표 구분)
formula_cols = 금액,기상환액,상환 후 잔액
# 헤더 기준 수식이 위치한 상대 행 오프셋 (쉼표 구분)
formula_rows_offset = 1,2


[ZQSAB01]
# ── QSA: 매출마감 실적현황 조회 (품목별 연결손익) ─────────────
# diagnose_zqsab01.py 로 확인된 실제 필드 ID

# 품목코드 필드 ID (선택 — 비워 두면 전체 조회)
pcode_field  = wnd[0]/usr/ctxtP_PCODE

# 작업기간 필드 ID  ← 기간 입력
perio_field  = wnd[0]/usr/txtP_PERIO

# 결과 리포트 Excel 버튼 ID
excel_btn    = wnd[0]/usr/btn%%PP09007_1000

# 인터랙트 조회 버튼 ID (ALV 조회용, 현재 미사용)
report_btn   = wnd[0]/usr/btn%%PP02006_1000

# 다운로드 대기 디렉토리 (Windows 기본 다운로드 폴더)
download_dir = C:/Users/Osstem/Downloads

# 결과 엑셀 저장 경로
output_dir   = sapost/data/output/zqsab01

[LOGGING]
level   = INFO
log_dir = sapost/logs
